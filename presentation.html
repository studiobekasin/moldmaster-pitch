<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoldMaster — Pitch Presentation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#0f172a;color:#f8fafc}

        .home-btn{position:fixed;top:16px;left:16px;z-index:100;text-decoration:none}
        .nav-btn{width:44px;height:44px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#94a3b8;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .nav-btn:hover{background:#0d9488;color:#fff;border-color:#0d9488}

        .figma-nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:12px;align-items:center;background:rgba(15,23,42,.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:8px 16px}
        .page-label{color:#64748b;font-size:.8rem;font-weight:600;min-width:80px;text-align:center}

        .figma-wrap{position:absolute;inset:0}
        .figma-wrap iframe{width:100%;height:100%;border:none}
    </style>
</head>
<body>

<a href="index.html" class="home-btn"><button class="nav-btn" title="Back to MoldMaster"><i class="fa-solid fa-house"></i></button></a>

<div class="figma-wrap">
    <iframe src="https://www.figma.com/embed?embed_host=share&url=https%3A%2F%2Fwww.figma.com%2Fdesign%2FNFYX8LnzensRLM5FzP143W%2FSlidy-Presentation-Template-for-Your-Next-Pitch-Deck-V1.0--Community-%3Fnode-id%3D1-2" allowfullscreen></iframe>
</div>

<div class="figma-nav">
    <button class="nav-btn" id="fs-btn" title="Fullscreen"><i class="fa-solid fa-expand"></i></button>
    <div class="page-label">Use arrow keys inside Figma to navigate slides</div>
</div>

<script>
document.getElementById('fs-btn').addEventListener('click',function(){
    var el=document.querySelector('.figma-wrap iframe');
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
});
</script>
</body>
</html>
