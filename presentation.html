<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoldMaster — Pitch Presentation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#0f172a;color:#f8fafc}

        .home-btn{position:fixed;top:20px;left:20px;z-index:100;text-decoration:none}
        .nav-btn{width:48px;height:48px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#94a3b8;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .nav-btn:hover{background:#0d9488;color:#fff;border-color:#0d9488}

        .nav-bar{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(15,23,42,.92);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;gap:1.5rem;z-index:100}
        .slide-counter{color:#64748b;font-size:.85rem;font-weight:600;min-width:60px;text-align:center}

        .progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#0d9488,#06b6d4);transition:width .4s ease;z-index:200}

        .slides-viewport{position:absolute;inset:0;bottom:64px;overflow:hidden}
        .slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:40px;opacity:0;transform:translateX(80px);transition:opacity .5s ease,transform .5s ease;pointer-events:none}
        .slide.active{opacity:1;transform:translateX(0);pointer-events:auto}
        .slide.exit-left{opacity:0;transform:translateX(-80px)}
        .slide img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
    </style>
</head>
<body>

<div class="progress" id="progress"></div>

<a href="index.html" class="home-btn">
    <button class="nav-btn" title="Back to MoldMaster"><i class="fa-solid fa-house"></i></button>
</a>

<div class="slides-viewport" id="viewport"></div>

<div class="nav-bar">
    <button class="nav-btn" id="prev-btn"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="slide-counter" id="counter">1 / 16</div>
    <button class="nav-btn" id="next-btn"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<script>
const slideFiles = [
    'slides/01.svg','slides/02.svg','slides/03.svg','slides/04.svg',
    'slides/05.svg','slides/06.svg','slides/07.svg','slides/08.svg',
    'slides/09.svg','slides/10.svg','slides/11.svg','slides/12.svg',
    'slides/13.svg','slides/14.svg','slides/15.svg','slides/16.svg'
];
const total = slideFiles.length;
let current = 0;

const viewport = document.getElementById('viewport');

// Create slide elements
slideFiles.forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.dataset.slide = i;
    const img = document.createElement('img');
    img.src = src;
    img.alt = 'Slide ' + (i + 1);
    img.draggable = false;
    div.appendChild(img);
    viewport.appendChild(div);
});

const slides = document.querySelectorAll('.slide');

function goTo(idx) {
    if (idx < 0 || idx >= total || idx === current) return;
    // Remove any lingering exit class
    slides.forEach(s => s.classList.remove('exit-left','active'));
    // Direction
    if (idx > current) {
        slides[current].classList.add('exit-left');
    } else {
        // going backwards - just fade
        slides[current].style.transform = 'translateX(80px)';
        slides[current].style.opacity = '0';
    }
    current = idx;
    // Small delay for transition overlap
    requestAnimationFrame(() => {
        slides[current].classList.add('active');
        slides[current].style.transform = '';
        slides[current].style.opacity = '';
    });
    document.getElementById('counter').textContent = (current + 1) + ' / ' + total;
    document.getElementById('progress').style.width = ((current + 1) / total * 100) + '%';
}

document.getElementById('prev-btn').addEventListener('click', () => goTo(current - 1));
document.getElementById('next-btn').addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(current - 1); }
});

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (dx < -50) goTo(current + 1);
    if (dx > 50) goTo(current - 1);
});

document.getElementById('progress').style.width = (1 / total * 100) + '%';
</script>
</body>
</html>
